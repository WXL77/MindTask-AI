<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>MindTask AI - 登录</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
    <style>
        :root { --primary: #135bec; }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            margin: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: var(--primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        .input-field {
            width: 100%;
            height: 48px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #f8fafc;
        }
        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(19,91,236,0.1);
            background: #fff;
        }
        .btn-primary {
            width: 100%;
            height: 48px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: #94a3b8;
            transition: all 0.2s;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 6px;
        }
        .switch-text {
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
            margin-top: 20px;
        }
        .switch-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Logo -->
        <div class="logo-icon">
            <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path d="M5 3l3.5 7L5 17l14-7L5 3z"/></svg>
        </div>
        <h1 style="text-align:center; font-size:24px; font-weight:700; margin-bottom:4px; letter-spacing:-0.02em;">MindTask AI</h1>
        <p style="text-align:center; font-size:14px; color:#94a3b8; margin-bottom:28px;">边聊天边整理待办的智能助手</p>

        <!-- Tabs -->
        <div style="display:flex; margin-bottom:24px; border-bottom:1px solid #e2e8f0;">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登录</button>
            <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">注册</button>
        </div>

        <!-- Error Message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="input-field" type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username" required/>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="input-field" type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password" required/>
            </div>
            <button class="btn-primary" type="submit" id="loginBtn">登录</button>
            <div class="switch-text">
                还没有账号？<a onclick="switchTab('register')">立即注册</a>
            </div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" style="display:none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label class="form-label">邀请码</label>
                <input class="input-field" type="text" id="regInviteCode" placeholder="输入邀请码" required/>
            </div>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="input-field" type="text" id="regUsername" placeholder="3-20位字母、数字、下划线" autocomplete="username" required/>
            </div>
            <div class="form-group">
                <label class="form-label">昵称（选填）</label>
                <input class="input-field" type="text" id="regDisplayName" placeholder="显示名称"/>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="input-field" type="password" id="regPassword" placeholder="至少6位" autocomplete="new-password" required/>
            </div>
            <button class="btn-primary" type="submit" id="regBtn">注册</button>
            <div class="switch-text">
                已有账号？<a onclick="switchTab('login')">去登录</a>
            </div>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('errorMsg').style.display = 'none';
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('tabRegister').classList.remove('active');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('tabLogin').classList.remove('active');
                document.getElementById('tabRegister').classList.add('active');
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = '登录中...';
            document.getElementById('errorMsg').style.display = 'none';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value.trim(),
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (err) {
                showError('网络错误，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.textContent = '注册中...';
            document.getElementById('errorMsg').style.display = 'none';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        invite_code: document.getElementById('regInviteCode').value.trim(),
                        username: document.getElementById('regUsername').value.trim(),
                        display_name: document.getElementById('regDisplayName').value.trim(),
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.error || '注册失败');
                }
            } catch (err) {
                showError('网络错误，请重试');
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }
    </script>
</body>
</html>
